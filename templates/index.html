<!DOCTYPE html>
<html>
<head>
    <title>Empathy Engine</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

    <h1>🎙️ Empathy Engine</h1>

    <form method="POST">
        <textarea name="text" rows="5" cols="50"
        placeholder="Enter text here..."></textarea>
        <br><br>
        <button type="submit">Generate Voice</button>
    </form>

    {% if audio_file %}
        <h3>Detected Emotion: {{ emotion }}</h3>

        <audio controls>
            <source src="{{ audio_file }}" type="audio/wav">
            Your browser does not support audio.
        </audio>
    {% endif %}

</body>
</html>
